<style>
 
  .mobile-sidebar {
   
    --bg-body-system: #fdfdfd; 
    --sidebar-width: 65px;
    
    position: fixed;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: var(--sidebar-width);
    background: rgb(255, 255, 255);
    border-radius: 50px;
    padding: 25px 0;
    box-shadow: 7px 9px 3px rgba(0, 0, 0, 0.3);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  .sidebar-menu {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-grow: 1;
  }

  .sidebar-item, .sidebar-logo {
    position: relative;
    width: 100%;
    height: 55px;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1;
    text-decoration: none; 
  }

  .sidebar-logo {
    margin-bottom: 25px;
    margin-top: -20px;
    cursor: default;
  }

  .sidebar-icon-img {
    width: 30px;  
    height: 30px; 
    object-fit: contain;
    position: relative;
    z-index: 2;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    filter: brightness(0) opacity(0.9);
  }

  .sidebar-logo .sidebar-icon-img {
    width: 60px;
    height: 70px;
    filter: none !important;
  }

  .sidebar-item:hover .sidebar-icon-img {
    transform: scale(1.15);
  }

  .sidebar-item.active .sidebar-icon-img {
    transform: translateX(12px) scale(1.1);
  }

  
  .sidebar-item.active::before {
    content: "";
    position: absolute;
    width: 70px;
    height: 70px;
    background: var(--bg-body-system);
    border-radius: 50%;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    box-shadow: 
        inset 7px 5px 1px rgba(0, 0, 0, 0.12),
        inset 1px -1px 0px rgba(237, 232, 232, 0.12);
    z-index: 2;
  }

  .sidebar-bottom {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 15px; 
    margin-bottom: 10px; 
  }

  .sidebar-back {
    border: none;
    background: transparent;
    cursor: pointer;
    text-decoration: none;
  }

  .sidebar-back .sidebar-icon-img {
    width: 40px;
    height: 40px;
    filter: none !important;
  }

  .sidebar-back:hover .sidebar-icon-img {
    transform: translateX(-5px) scale(1.1);
    filter: none !important;
  }

  .sidebar-icon-img.fix-size {
    width: 58px;
    height: 58px;
  }

   
  @media (max-width: 768px) {
    .mobile-sidebar { --sidebar-width: 70px; }
    .sidebar-item { height: 55px; }
    .sidebar-item.active::before { width: 55px; height: 55px; right: -30px; }
    .sidebar-item.active .sidebar-icon-img { transform: translateX(10px) scale(1.1); }
  }

  @media (max-width: 480px) {
    .mobile-sidebar { 
      --sidebar-width: 65px; 
      left: 10px; 
      padding: 15px 0; 
    }
    .sidebar-icon-img { width: 24px; height: 24px; }
    .sidebar-logo .sidebar-icon-img { width: 32px; height: 32px; }
    .sidebar-item { height: 50px; }
    .sidebar-item.active::before { width: 50px; height: 50px; right: -2px; }
    .sidebar-item.active .sidebar-icon-img { transform: translateX(8px) scale(1.1); }
  }

  @media (max-width: 360px) {
    .mobile-sidebar { 
      --sidebar-width: 60px; 
      left: 5px; 
    }
    .sidebar-icon-img { width: 22px; height: 22px; }
    .sidebar-item { height: 45px; }
    .sidebar-item.active::before { width: 45px; height: 45px; right: -9px; }
  }
</style>

<aside class="mobile-sidebar">
  <div class="sidebar-logo">
    <img src="../assets/vendor/bootstrap/image/sidebar/Perodua_logo.png" alt="Logo" class="sidebar-icon-img">
  </div>

  <div class="sidebar-menu">
    <a href="modul_1.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-def-icon.png" alt="Icon 1" class="sidebar-icon-img">
    </a>
    
    <a href="modul_2.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-func-icon2.png" alt="Icon 2" class="sidebar-icon-img fix-size">
    </a>
    
    <a href="modul_3.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-hist-icon.png" alt="Icon 3" class="sidebar-icon-img">
    </a>
    
    <a href="modul_4.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-type-icon.png" alt="Icon 4" class="sidebar-icon-img">
    </a>
    
    <a href="modul_5.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-comp-icon.png" alt="Icon 5" class="sidebar-icon-img">
    </a>
    
    <a href="modul_6.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-tech-icon.png" alt="Icon 6" class="sidebar-icon-img">
    </a>
    
    <a href="modul_7.html" class="sidebar-item">
      <img src="../assets/vendor/bootstrap/image/sidebar/tab-compa-icon.png" alt="Icon 7" class="sidebar-icon-img">
    </a>
  </div>

  <div class="sidebar-bottom">
    <a href="halaman_utama.html" class="sidebar-back">
      <img src="../assets/vendor/bootstrap/image/sidebar/Back.png" alt="Back" class="sidebar-icon-img">
    </a>
  </div>
</aside>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    
    const currentPath = window.location.pathname;
    const sidebarLinks = document.querySelectorAll(".sidebar-menu .sidebar-item");

    sidebarLinks.forEach(link => {
      const linkPath = link.getAttribute("href");
      
      
      if (linkPath && currentPath.includes(linkPath)) {
        link.classList.add("active");
      } else {
        link.classList.remove("active");
      }
    });
  });
</script>
