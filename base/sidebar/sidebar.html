<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perodua Mobile Sidebar - Perfect Cutout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg-body: #fdfdfd;
      --bg-sidebar: rgb(255, 255, 255);
      --sidebar-width: 65px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-body);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .mobile-sidebar {
      position: fixed;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-radius: 50px;
      padding: 25px 0;
      box-shadow: 7px 9px 3px rgba(0, 0, 0, 0.3);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      
    }

    .sidebar-menu {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-grow: 1;
    }

    .sidebar-item, .sidebar-logo {
      position: relative;
      width: 100%;
      height: 55px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1;
    }

    .sidebar-logo {
      margin-bottom: 25px;
      margin-top:-20px;
      cursor: default;
    }

    .sidebar-icon-img {
      width: 30px;  
      height: 30px; 
      object-fit: contain;
      position: relative;
      z-index: 2;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      filter: brightness(0) opacity(0.9);
    }

    .sidebar-logo .sidebar-icon-img {
      width: 60px;
      height: 70px;
      filter: none !important;
    }

    .sidebar-item:hover .sidebar-icon-img {
      transform: scale(1.15);
    }

    .sidebar-item.active .sidebar-icon-img {
      transform: translateX(12px) scale(1.1);
    }

    .sidebar-item.active::before {
      content: "";
      position: absolute;
      width: 70px;
      height: 70px;
      background: var(--bg-body);
      border-radius: 50%;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 
          
          inset 7px 5px 1px rgba(0, 0, 0, 0.12),
          inset 1px -1px 0px rgba(237, 232, 232, 0.12);
          
          
        z-index: 2;
    }
    .sidebar-bottom {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: auto;
      margin-top: 15px; 
      margin-bottom: 10px; 
    }

    .sidebar-back {
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .sidebar-back .sidebar-icon-img {
      width: 40px;
      height: 40px;
      filter: none !important;
    }

    .sidebar-back:hover .sidebar-icon-img {
      transform: translateX(-5px) scale(1.1);
      filter: none !important;
    }

    .sidebar-icon-img.fix-size {
      width: 58px;
      height: 58px;
    }

    .page-content {
      padding: 40px 40px 40px 120px;
    }

   
    @media (max-width: 768px) {
      :root { --sidebar-width: 60px; } 
      .sidebar-item { height: 50px; }
      .sidebar-logo { margin-bottom: 20px; margin-top: -15px; }
      .sidebar-logo .sidebar-icon-img { width: 50px; height: 60px; } 
      .sidebar-icon-img { width: 26px; height: 26px; }
      .sidebar-icon-img.fix-size { width: 50px; height: 50px; }
      .sidebar-back .sidebar-icon-img { width: 35px; height: 35px; }

      
      .sidebar-item.active::before {
        width: 65px; height: 65px; right: -18px;
      }
      .sidebar-item.active .sidebar-icon-img { transform: translateX(10px) scale(1.1); }
      .page-content { padding-left: 90px; }
    }

    
    @media (max-width: 480px) {
      :root { --sidebar-width: 55px; } 
      .mobile-sidebar { left: 10px; padding: 15px 0; }
      .sidebar-item { height: 45px; }
      .sidebar-logo { margin-bottom: 15px; margin-top: -10px; }
      .sidebar-logo .sidebar-icon-img { width: 45px; height: 50px; }
      .sidebar-icon-img { width: 24px; height: 24px; }
      .sidebar-icon-img.fix-size { width: 45px; height: 45px; }
      .sidebar-back .sidebar-icon-img { width: 30px; height: 30px; }

      .sidebar-item.active::before {
        width: 60px; height: 60px; right: -15px;
      }
      .sidebar-item.active .sidebar-icon-img { transform: translateX(8px) scale(1.1); }
      .page-content { padding: 20px 20px 20px 80px; }
    }

   
    @media (max-width: 360px) {
      :root { --sidebar-width: 50px; } 
      .mobile-sidebar { left: 8px; padding: 10px 0; }
      .sidebar-item { height: 40px; }
      .sidebar-logo { margin-bottom: 10px; margin-top: -5px; }
      .sidebar-logo .sidebar-icon-img { width: 38px; height: 45px; }
      .sidebar-icon-img { width: 20px; height: 20px; }
      .sidebar-icon-img.fix-size { width: 38px; height: 38px; }
      .sidebar-back .sidebar-icon-img { width: 26px; height: 26px; }

      
      .sidebar-item.active::before {
        width: 54px; height: 54px; right: -12px;
      }
      .sidebar-item.active .sidebar-icon-img { transform: translateX(6px) scale(1.1); }
      .page-content { padding-left: 70px; }
    }
  </style>
</head>
<body>

  <aside class="mobile-sidebar">
    <div class="sidebar-logo">
      <img src="../assets/vendor/bootstrap/image/sidebar/Perodua_logo.png" alt="Logo" class="sidebar-icon-img">
    </div>

    <div class="sidebar-menu">
      <button class="sidebar-item" title="Buku Manual" aria-label="Buku Manual">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-def-icon.png" alt="Icon 1" class="sidebar-icon-img">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-func-icon2.png" alt="Icon 2" class="sidebar-icon-img fix-size">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-hist-icon.png" alt="Icon 3" class="sidebar-icon-img">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-type-icon.png" alt="Icon 4" class="sidebar-icon-img">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-comp-icon.png" alt="Icon 5" class="sidebar-icon-img">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-tech-icon.png" alt="Icon 6" class="sidebar-icon-img">
      </button>
      <button class="sidebar-item">
        <img src="../assets/vendor/bootstrap/image/sidebar/tab-compa-icon.png" alt="Icon 7" class="sidebar-icon-img">
      </button>
    </div>

    <div class="sidebar-bottom">
      <button class="sidebar-back">
        <img src="../assets/vendor/bootstrap/image/sidebar/Back.png" alt="Back" class="sidebar-icon-img">
      </button>
    </div>
  </aside>

  <main class="page-content">
    <div class="container-fluid">
      <h2 class="mb-4">Dashboard Perodua</h2>
      <div class="card p-4 shadow-sm border-0" style="border-radius: 15px;">
        
      </div>
    </div>
  </main>

  <script>
    const sidebarItems = document.querySelectorAll(".sidebar-menu .sidebar-item");

    sidebarItems.forEach(item => {
      item.addEventListener("click", () => {
        sidebarItems.forEach(btn => btn.classList.remove("active"));
        item.classList.add("active");
      });
    });
  </script>

</body>
</html>
