<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>E-Learning of Vehicle Structure</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/vendor/bootstrap/image/home/perodua.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/vendor/bootstrap/image/home/perodua.png"
    />
    <link
      rel="apple-touch-icon"
      href="./assets/vendor/bootstrap/image/home/perodua.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --p-green: #147029;
        --bg-gray: #d9d9d9;
        --card-white: #eeeeee;
        --tile-bg: #cccccc;
        --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg-gray);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px; /* Padding for mobile edges */
      }

      .app-wrapper {
        width: 100%;
        max-width: 1200px; /* Prevents it from getting too wide on ultrawide monitors */
        position: relative;
      }

      .logo-container {
        margin-bottom: 10px;
      }

      /* MAIN LAYOUT: Responsive Grid */
      .dashboard {
        display: grid;
        grid-template-columns: 1.5fr 1fr; /* Desktop default */
        gap: 20px;
        align-items: stretch;
      }

      /* LEFT HERO CARD */
      .hero-card {
        background: var(--card-white);
        border-radius: var(--radius);
        padding: 30px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow);
        min-height: 400px;
      }

      .hero-card h1 {
        color: #555;
        font-size: clamp(1.2rem, 4vw, 2rem); /* Fluid typography */
        text-align: center;
        line-height: 1.1;
        margin-bottom: 20px;
      }

      .main-car {
        width: 80%;
        height: auto;
        max-width: 400px;
        margin-bottom: 40px;
      }

      /* BUTTONS ON HERO */
      .hero-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        align-self: flex-end;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        background: var(--p-green);
        color: white;
        padding: 8px 25px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      /* MASCOT */
      .mascot {
        position: absolute;
        bottom: -30px;
        left: -10px;
        width: clamp(120px, 20vw, 200px); /* Scales with screen size */
        z-index: 10;
        pointer-events: none; /* Allows clicking buttons behind it if they overlap */
      }

      /* RIGHT GRID */
      .module-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 12px;
      }

      .tile {
        background: var(--tile-bg);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        overflow: hidden;
        transition: transform 0.2s;
        box-shadow: var(--shadow);
      }

      .tile img {
        padding: 5px;
        margin: auto;
        width: clamp(50px, 8vw, 80px); /* Fluid icon size */
        height: auto;
        filter: grayscale(100%) brightness(0.2);
      }

      .tile span {
        background: var(--p-green);
        color: white;
        width: 100%;
        text-align: center;
        padding: 6px 0;
        font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      }

      /* --- RESPONSIVE BREAKPOINTS --- */

      /* Tablets and small laptops */
      @media (max-width: 1024px) {
        .app-wrapper {
          width: 98%; /* Use more of the screen on tablets */
        }
        .dashboard {
          grid-template-columns: 1.3fr 1fr; /* Adjust ratio for narrower screens */
          gap: 20px;
        }
        .hero-card h1 {
          font-size: 1.6rem; /* Slightly smaller text */
        }
      }

      /* Mobile Phones (Switch to single column) */
      @media (max-width: 768px) {
        body {
          overflow-y: auto; /* Allow scrolling on small screens */
        }
        .dashboard {
          grid-template-columns: 1fr; /* Stack vertically */
        }
        .hero-card {
          min-height: 350px;
          padding-bottom: 60px; /* Space for mascot */
        }
        .mascot {
          /* Align straight with the bottom of the card */
          bottom: 0px;
          left: 10px;
          width: 140px; /* Fixed or relative size for mobile */
          position: absolute;
        }
        .module-grid {
          grid-template-rows: auto; /* Let tiles find their height */
        }
        .tile {
          height: 120px; /* Fixed height for tiles on mobile stack */
        }
      }

      /* Orientation Overlay */
      #orientation-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--p-green);
        color: white;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }

      @media screen and (orientation: portrait) {
        #orientation-overlay {
          display: flex;
        }
        .app-wrapper {
          display: none;
        }
      }
      /* Icon animation for the overlay */
      .rotate-icon {
        width: 80px;
        margin-bottom: 20px;
        animation: rotateDevice 2s infinite;
      }

      @keyframes rotateDevice {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-90deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="orientation-overlay">
      <img
        src="https://cdn-icons-png.flaticon.com/512/3588/3588264.png"
        class="rotate-icon"
        alt="Rotate"
      />
      <h2>Please Rotate Your Device</h2>
      <p>This e-learning module is optimized for landscape mode.</p>
    </div>

    <div class="app-wrapper">
      <div class="logo-container">
        <img
          src="./assets/vendor/bootstrap/image/home/perodua.png"
          alt="Perodua"
          width="60"
        />
      </div>

      <div class="dashboard">
        <section class="hero-card">
          <h1>E-Learning of<br />Vehicle Structure</h1>
          <img
            src="./assets/vendor/bootstrap/image/home/car.png"
            alt="Myvi"
            class="main-car"
          />

          <div class="hero-actions">
            <a href="#" class="btn">Media <span>▶</span></a>
            <a href="#" class="btn">Pre-Test Quiz <span>▶</span></a>
          </div>

          <img
            src="./assets/vendor/bootstrap/image/home/avatar1.png"
            alt="Character"
            class="mascot"
          />
        </section>

        <section class="module-grid">
          <a href="chassis.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/chassis.png"
              alt=""
            />
            <span>Chassis</span>
          </a>
          <a href="engine.html" class="tile">
            <img src="./assets/vendor/bootstrap/image/home/engine.png" alt="" />
            <span>Engine</span>
          </a>
          <a href="powertrain.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/powertrain.png"
              alt=""
            />
            <span>Power Train</span>
          </a>
          <a href="bodyshell.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/bodyshell.png"
              alt=""
            />
            <span>Body Shell</span>
          </a>
          <a href="interior.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/interior.png"
              alt=""
            />
            <span>Interior</span>
          </a>
          <a href="electrical.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/electrical.png"
              alt=""
            />
            <span>Electrical</span>
          </a>
          <a href="upperbody.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/upperbody.png"
              alt=""
            />
            <span>Upper Body</span>
          </a>
          <a href="underbody.html" class="tile">
            <img
              src="./assets/vendor/bootstrap/image/home/underbody.png"
              alt=""
            />
            <span>Underbody</span>
          </a>
        </section>
      </div>
    </div>
  </body>
</html>
