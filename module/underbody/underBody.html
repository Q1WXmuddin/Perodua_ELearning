<!doctype html>
<html lang="en">
  <head>
    <script src="../../assets/vendor/bootstrap/js/externalJs/header.js"></script>

    <style>
      :root {
        --bg-color: #d8d8d8; /* Matching the light grey in your image */
        --accent-green: #1a632a;
        --text-white: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background-color: #e6e6e6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      .main-container {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 15px;
        width: 95%;
        max-width: 1000px;
        height: 80vh; /* Controlled height */
      }

      h2.title {
        position: absolute;
        top: -60px;
        left: 0;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #555;
        font-size: 1.8rem;
        margin-top: 5px;
      }

      .card {
        flex: 1;
        border-radius: 20px 20px 10px 10px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden; /* Clips the background inside the radius */

        /* The Magic Part: The background is applied to EVERY card */
        background-image: url("/assets/vendor/bootstrap/image/underBody/underbody_simple_background.png");
        background-repeat: no-repeat;
        background-size: 60%; /* Adjust size to fit your container */
        background-position: 55%;
        /* Fixed ensures the image stays in one spot globally as you move the cards */
        background-attachment: fixed;

        /* This creates the light grey overlay so the image looks faded/merged */
        background-color: rgba(177, 176, 176, 0.4);
        background-blend-mode: lighten;

        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      /* Heights matching your image pattern */
      .h-tall {
        height: 100%;
      }
      .h-med-tall {
        height: 95%;
      }
      .h-short {
        height: 90%;
      }

      /* Footer Styling */
      .footer-span {
        background-color: var(--accent-green);
        color: var(--text-white);
        height: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 0.75rem;
        font-weight: 400;
        border-radius: 0 0 10px 10px;
        text-align: center;
        padding: 0 5px;
      }

      /* Icon with Curve Cutout Effect */
      .icon-box {
        position: absolute;
        top: -28px;
        width: 50px;
        height: 50px;
        background-color: var(--accent-green);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .icon-box img {
        width: 35px;
        filter: brightness(0) invert(1);
      }

      .icon-box1 {
        position: absolute;
        top: -28px;
        width: 50px;
        height: 50px;
        background-color: var(--accent-green);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .icon-box1 img {
        width: 50px;
        filter: brightness(0) invert(1);
      }

      .icon-box2 {
        position: absolute;
        top: -28px;
        width: 50px;
        height: 50px;
        background-color: var(--accent-green);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .icon-box2 img {
        width: 40px;
        filter: brightness(0) invert(1);
      }

      /* Tablet Landscape / Small Laptops */
      @media (max-width: 1024px) {
        .main-container {
          width: 98%;
          height: 75vh; /* Slightly shorter to fit tablet screens better */
          gap: 10px; /* Tighter gap */
        }

        h2.title {
          font-size: 1.5rem;
          top: -50px;
        }

        .footer-span {
          font-size: 0.7rem; /* Smaller text for smaller widths */
          height: 70px;
        }

        .icon-box,
        .icon-box1,
        .icon-box2 {
          width: 40px;
          height: 40px;
          top: -20px;
        }

        .icon-box img,
        .icon-box1 img,
        .icon-box2 img {
          width: 25px !important; /* Force icons to scale down */
        }
      }

      /* Tablets Portrait and Mobile */
      @media (max-width: 768px) {
        body {
          align-items: center; /* Ensure it stays centered */
          overflow-x: hidden;
        }

        .main-container {
          height: 70vh;
          gap: 10px;

          /* Allow horizontal scrolling so cards don't squish too much */
          overflow-x: auto;
          justify-content: flex-start;
          align-items: flex-end;
          -webkit-overflow-scrolling: touch;
        }

        /* Ensure cards maintain a minimum readable width */
        .card {
          min-width: 120px;
          flex: 0 0 auto; /* Stop cards from shrinking to 0 */
        }

        /* Optional: Hide scrollbar for a cleaner look */
        .main-container::-webkit-scrollbar {
          display: none;
        }

        h2.title {
          /* Fixed keeps it stuck to the screen, not the scrolling cards */
          position: fixed;
          top: 20px;
          left: 130px;
          font-size: 1.4rem;
          z-index: 100; /* Stays on top of everything */
          margin: 0;
        }
      }

      /* Small Mobile Devices */
      @media (max-width: 480px) {
        .main-container {
          height: 60vh;
        }

        .card {
          min-width: 100px;
        }

        .footer-span {
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <h2 class="title">UNDER BODY</h2>

      <div class="card h-tall">
        <div class="footer-span">
          <div class="icon-box">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-def-icon.png"
            />
          </div>
          Definition
        </div>
      </div>

      <div class="card h-med-tall">
        <div class="footer-span">
          <div class="icon-box1">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-func-icon.png"
            />
          </div>
          Function
        </div>
      </div>

      <div class="card h-tall">
        <div class="footer-span">
          <div class="icon-box">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-hist-icon.png"
            />
          </div>
          History
        </div>
      </div>

      <div class="card h-short">
        <div class="footer-span">
          <div class="icon-box">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-type-icon.png"
            />
          </div>
          Types
        </div>
      </div>

      <div class="card h-tall">
        <div class="footer-span">
          <div class="icon-box">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-comp-icon.png"
            />
          </div>
          Components
        </div>
      </div>

      <div class="card h-med-tall">
        <div class="footer-span">
          <div class="icon-box">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-tech-icon.png"
            />
          </div>
          Technologies
        </div>
      </div>

      <div class="card h-tall">
        <div class="footer-span">
          <div class="icon-box2">
            <img
              src="/assets/vendor/bootstrap/image/chassis/tab-compa-icon.png"
            />
          </div>
          Comparison
        </div>
      </div>
    </div>
  </body>
</html>
